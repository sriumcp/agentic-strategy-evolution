$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://github.com/AI-native-Systems-Research/agentic-strategy-evolution/schemas/bundle.schema.yaml"
title: Hypothesis Bundle
description: >
  A structured set of falsifiable hypotheses (arms) designed to test a mechanism.
  Each arm is a (prediction, mechanism, diagnostic) triple.

type: object
required: [metadata, arms]
additionalProperties: true

properties:
  metadata:
    type: object
    required: [iteration, family, research_question]
    additionalProperties: false
    properties:
      iteration:
        type: integer
        minimum: 1
      family:
        type: string
        minLength: 1
      research_question:
        type: string
        minLength: 1
      # #206: accept complexity_tier / tier_justification under metadata
      # too (where iteration / family / research_question already live).
      # The legacy top-level location is still accepted for backward-compat;
      # readers prefer metadata when both are present.
      complexity_tier:
        type: integer
        minimum: 1
        maximum: 4
        description: "See top-level complexity_tier — accepted here for ergonomics (#206)."
      tier_justification:
        type: string
        description: "See top-level tier_justification — accepted here for ergonomics (#206)."

  arm_selection_rationale:
    type: string
    description: "Brief explanation of which arms were chosen and why."

  complexity_tier:
    type: integer
    minimum: 1
    maximum: 4
    description: >
      Iteration's complexity tier (issue #159). 1 = single mechanism +
      single knob + treatment-vs-control; 2 = single mechanism + multi-knob
      OR ablation OR dose-response; 3 = multi-mechanism interactions,
      super-additivity; 4 = cross-system / cross-workload generalization.
      Iteration N may use any tier <= N — so iter 1 is forced to tier 1.
  tier_justification:
    type: string
    description: "Brief reason for the chosen tier given the iteration index and prior refutations."

  ground_truth:
    type: object
    description: >
      Optional declaration of how the experiment will judge correctness
      (issue #85). Forces the designer to make the detector / ground-truth
      independence explicit so the validator can reject tautological
      experiments — see #84.
    required: [definition, shares_computation_with_detector]
    additionalProperties: false
    properties:
      definition:
        type: string
        minLength: 1
        description: "How the ground truth is computed (plain English)."
      measurement_type:
        type: string
        enum: [stock, flow, trend, ratio, count, derived]
        description: "Kind of signal the ground truth is. Compared against detector_measurement_type to flag potential overlap."
      detector_measurement_type:
        type: string
        enum: [stock, flow, trend, ratio, count, derived]
        description: "Kind of signal the detector under test produces."
      independence_argument:
        type: string
        minLength: 1
        description: "Plain-English justification that the ground truth can disagree with the detector. Missing field downgrades to a WARN at validate time."
      shares_computation_with_detector:
        type: boolean
        description: "Author's self-assessment. true ⇒ tautological by construction; validator REJECTS. false ⇒ explicit declaration of independence."

  # ─── #209/#210: operational experiment_spec block ───────────────────────
  # Optional structured block that lets the DESIGN agent pin operational
  # decisions (build commands, fan-out template, classification logic,
  # verified parameters) so the EXECUTE_ANALYZE agent doesn't re-derive
  # them in a fresh worktree. All fields are optional; freeform
  # experiment_spec content alongside (top-level allows additional
  # properties anyway) remains supported for backward compat.
  experiment_spec:
    type: object
    # Locked enum: typo'd field names (e.g. preflight_command singular,
    # verifid_parameters) would otherwise pass schema validation and
    # silently fail at runtime when the executor doesn't see them. The
    # four sub-fields are an enumerated DESIGN→EXECUTE_ANALYZE contract;
    # adding a new one requires a schema change so executor-side
    # consumers update in lockstep.
    additionalProperties: false
    description: >
      Operational handoff from DESIGN to EXECUTE_ANALYZE. Pin decisions
      that don't belong in narrative form: commands the executor must
      run before the main fan-out (#209), how to classify per-request
      output when tenant_id isn't reliable (#210), the parallel-fan-out
      template (#210), and any parameters the DESIGN phase verified
      against the target system (#210).
    properties:
      preflight_commands:
        type: array
        items: { type: string, minLength: 1 }
        description: >
          Shell commands the EXECUTE_ANALYZE agent must run before the
          main fan-out (#209). Use for build steps that don't carry
          across the fresh git worktree (e.g. ``go build -o blis main.go``)
          and any one-off setup the design agent verified manually.
      fanout_template:
        type: string
        minLength: 1
        description: >
          The exact shell template EXECUTE_ANALYZE should use to fan
          arms out in parallel (#210). Avoids GNU-parallel quoting
          gotchas that the DESIGN agent already worked through.
      classification_function:
        type: string
        minLength: 1
        description: >
          Plain-Python expression or short snippet describing how to
          label a result row (e.g. cooperators vs adversaries) when
          the target's per-request output lacks the obvious tag (#210).
          Frees EXECUTE_ANALYZE from re-grepping the target's source
          to re-derive what DESIGN already figured out.
      verified_parameters:
        type: object
        additionalProperties: true
        description: >
          Parameters the DESIGN phase verified work for the target
          system, e.g. ``{total_kv_blocks: 1200}``. EXECUTE_ANALYZE
          treats them as canonical; deviations require an entry in
          ``bundle_amendments.jsonl`` (#211).
      rehearsal_subset:
        # #222: structured rehearsal scope. When iteration_mode ==
        # "rehearsal" AND this field is populated, EXECUTE_ANALYZE
        # executes ONLY this subset (not the full experiment_spec).
        # Without this field, the rehearsal agent has to infer scope
        # from prose methodology — which the post-#212 paper-burst
        # rerun showed is unreliable (the agent fanned out the full
        # 50-arm bundle anyway).
        type: object
        additionalProperties: false
        description: >
          Subset of the full experiment to execute in rehearsal mode (#222).
          DESIGN populates this; EXECUTE_ANALYZE in rehearsal mode runs
          ONLY this subset. iter-2 (real mode) ignores this field and
          runs the full experiment_spec.
        properties:
          seeds:
            type: array
            items: { type: integer }
            minItems: 1
            description: >
              Subset of canonical seeds to execute in rehearsal.
              Typically the first canonical seed only.
          arms:
            type: array
            items: { type: string, minLength: 1 }
            minItems: 1
            description: >
              Subset of arm IDs to execute in rehearsal — typically
              the contrast pair (h-main + the most direct control).
          extra_validation_only:
            type: boolean
            description: >
              When true, rehearsal does NOT make scientific claims —
              ``findings.json`` is marked ``mode: rehearsal`` regardless
              of confirmed/refuted status. Iter-2 makes the canonical
              scientific call.
      timing_observations:
        # #226: structured per-policy timing data captured during
        # rehearsal feasibility probes. Fields are SCHEMA-LOCKED here
        # (vs verified_parameters which is open by design — that's a
        # knob namespace; this is a measurement record). Iter-2's
        # SDKDispatcher reads ``recommended_turn_silence_threshold_seconds``
        # to calibrate the live watchdog (#205).
        type: object
        additionalProperties: false
        description: >
          Per-policy wall-time observations from rehearsal feasibility
          probes (#226). Used by the engine to calibrate iter-2's
          watchdog thresholds and by the brief_amendments machinery
          to surface recurring slow-policy patterns across runs.
        properties:
          expected_wall_time_seconds_per_policy:
            type: object
            description: >
              Map of policy name → observed wall-time seconds. Recorded
              during the rehearsal feasibility probe at one canonical
              seed. EXECUTE_ANALYZE's per-arm timeout (when the runner
              supports one) and the watchdog threshold derive from this.
            additionalProperties:
              type: number
              minimum: 0
          recommended_turn_silence_threshold_seconds:
            type: number
            minimum: 0
            description: >
              Suggested override for ``campaign.sdk_timeouts.turn_silence_threshold_seconds``
              for iter-2 / real iters. Computed by the rehearsal agent
              as roughly 3× the slowest policy observed, with buffer.
              ``SDKDispatcher`` reads this in preference to the
              campaign-level default.
          observation_method:
            type: string
            minLength: 1
            description: >
              How the observations were collected (e.g. "feasibility
              probe at seed=42, horizon=120s, single arm per policy").
              Helps iter-2 / future runs interpret the numbers
              correctly.

  arms:
    type: array
    minItems: 1
    items:
      $ref: "#/$defs/arm"

$defs:
  arm:
    type: object
    required: [type, prediction, mechanism, diagnostic]
    additionalProperties: false
    properties:
      type:
        type: string
        enum:
          - h-main
          - h-ablation
          - h-super-additivity
          - h-control-negative
          - h-robustness
          - h-dose-response
          - h-tradeoff
      component:
        type: string
        description: "Component name, used for h-ablation arms."
      prediction:
        type: string
        minLength: 1
        description: "Quantitative claim with measurable success/failure threshold."
      mechanism:
        type: string
        minLength: 1
        description: "Causal explanation of how/why."
      diagnostic:
        type: string
        minLength: 1
        description: "What to investigate if the prediction is wrong."
      metadata:
        type: object
        description: "Optional domain-specific metadata for this arm."

      # ─── Adaptive sweep (issue #165) ───────────────────────────────────
      # Optional adaptive sub-arm sweep block. When present, the runner
      # delegates to orchestrator.arm_sweep.run_sweep with an Optuna-
      # backed sampler instead of iterating a fixed condition list.
      # Use for 1-D scalar searches with monotone or unimodal expected
      # response (boundary finding, threshold seeking, simple optimization).
      sweep:
        type: object
        required: [param, low, high, budget]
        additionalProperties: false
        properties:
          param:
            type: string
            minLength: 1
            description: "Knob being swept."
          low:
            type: number
            description: "Lower bound of the search domain (inclusive)."
          high:
            type: number
            description: "Upper bound of the search domain (inclusive)."
          budget:
            type: integer
            minimum: 1
            description: "Maximum number of trials the sampler may run."
          direction:
            type: string
            enum: [minimize, maximize]
            description: "Optimization direction. Default 'minimize'."
          sampler_name:
            type: string
            description: "Sampler hint (e.g. 'tpe', 'gp'). Default 'tpe'. Informational."

      # ─── Seeds rationale (issue #163) ──────────────────────────────────
      # Optional power-analysis declaration. When present, the design
      # phase substitutes the computed N for the literal seed count and
      # records the calculation in handoff.md. See orchestrator.power.
      seeds_rationale:
        type: object
        required: [effect_size]
        additionalProperties: false
        properties:
          effect_size:
            type: number
            exclusiveMinimum: 0
            description: "Magnitude to detect. Cohen's d for t; Cohen's h for proportions."
          power:
            type: number
            exclusiveMinimum: 0
            exclusiveMaximum: 1
            description: "Detection probability if effect exists. Default 0.8."
          alpha:
            type: number
            exclusiveMinimum: 0
            exclusiveMaximum: 1
            description: "Two-sided significance level. Default 0.05."
          kind:
            type: string
            enum: [t, proportions]
            description: "Test family. Default 't' (two-sample t-test)."

      # ─── H-dose-response fields (issue #157) ───────────────────────────
      # Required when type == h-dose-response (cross-checked in
      # orchestrator.validate). Schema keeps them optional to preserve
      # additive-only backward compatibility for existing arm types.
      knob:
        type: string
        minLength: 1
        description: "Name of the knob being varied. h-dose-response only."
      values:
        type: array
        minItems: 3
        uniqueItems: true
        items:
          oneOf:
            - { type: number }
            - { type: string, minLength: 1 }
        description: "Distinct knob settings to test. h-dose-response only; >= 3 values."
      metric:
        type: string
        minLength: 1
        description: "Observable metric whose response shape is being tested."
      expected_shape:
        type: string
        enum:
          - monotone_decreasing
          - monotone_increasing
          - u_shaped
          - inverted_u
          - saturating
          - flat
        description: "Predicted shape of metric vs. knob value."

      # ─── H-tradeoff fields (issue #158) ────────────────────────────────
      # Required when type == h-tradeoff (cross-checked in
      # orchestrator.validate). The arm declares an intervention's
      # improvement on `metric` and the maximum acceptable degradation
      # of `secondary_metric` (in the named "worse" direction).
      secondary_metric:
        type: string
        minLength: 1
        description: "Cost metric paired with `metric` for h-tradeoff arms; must differ from `metric`."
      secondary_budget:
        type: number
        minimum: 0
        description: "Maximum acceptable degradation in secondary_metric, in the worse direction. h-tradeoff only."
      secondary_direction:
        type: string
        enum: [increase, decrease]
        description: "Which way is 'worse' for secondary_metric (e.g., increase for memory, decrease for accuracy)."
      primary_change:
        type: number
        description: "Predicted directional change in `metric` (signed). h-tradeoff only."
      intervention_ref:
        type: string
        description: "Optional reference to the intervention (other arm id or description)."

      code_changes:
        type: array
        description: "Optional code change intents. Planner says what and why, not how."
        items:
          type: object
          required: [file, intent, rationale]
          additionalProperties: false
          properties:
            file:
              type: string
              minLength: 1
              description: "File path relative to repo root."
            intent:
              type: string
              minLength: 1
              description: "What change to make (plain English, not a patch)."
            rationale:
              type: string
              minLength: 1
              description: "Why this change tests the hypothesis."
