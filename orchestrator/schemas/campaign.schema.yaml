$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://github.com/AI-native-Systems-Research/agentic-strategy-evolution/schemas/campaign.schema.yaml"
title: Campaign Configuration
description: >
  Domain-specific settings for a Nous campaign. Configures the target system,
  reviewer panel, and prompt layers. Generated during setup (with Claude assistance)
  and referenced by state.json via config_ref.

type: object
required: [target_system, research_question, prompts]
additionalProperties: false

properties:
  research_question:
    type: string
    minLength: 1
    description: "The guiding research question for this campaign."

  run_id:
    type: string
    minLength: 1
    description: "Working directory name for campaign output. CLI --run-id overrides this. Default: derived from campaign file path."

  max_iterations:
    type: integer
    minimum: 1
    description: "Maximum number of iterations for run_campaign.py. CLI --max-iterations overrides this. Default: 10."

  target_system:
    type: object
    required: [name, description]
    additionalProperties: false
    properties:
      name:
        type: string
        minLength: 1
        description: "Human-readable system name."
      description:
        type: string
        minLength: 1
        description: "What the system does — domain, purpose, architecture."
      observable_metrics:
        type: array
        items: { type: string, minLength: 1 }
        minItems: 1
        description: "Measurable outputs (e.g., latency, throughput, error rate)."
      controllable_knobs:
        type: array
        items: { type: string, minLength: 1 }
        minItems: 1
        description: "What can be changed (algorithms, configs, resource limits)."
      repo_path:
        type: ["string", "null"]
        minLength: 1
        description: "Path to target system git repo. Used by CLIDispatcher for code-access agents. If set, experiments run in isolated worktrees."

  models:
    type: object
    additionalProperties: false
    description: "Per-phase model selection. Omit to use --model default for all phases."
    properties:
      design: { type: string, description: "Model for DESIGN phase (claude -p). Default: claude-opus-4-6." }
      execute_analyze: { type: string, description: "Model for EXECUTE_ANALYZE phase (claude -p). Default: claude-sonnet-4-6." }
      report: { type: string, description: "Model for report generation (LLM API). Default: claude-sonnet-4-6." }

  prompts:
    type: object
    required: [methodology_layer]
    additionalProperties: false
    properties:
      methodology_layer:
        type: string
        minLength: 1
        description: "Path to generic Nous methodology prompts."
      domain_adapter_layer:
        type: ["string", "null"]
        description: "Path to domain-specific prompt overrides. Null if not yet generated."

  pre_work_script:
    type: string
    minLength: 1
    description: >
      Optional path to a user-supplied pre-work script (issue #167). Run before
      iter-1 DESIGN as a subprocess; the stdout JSON is parsed into a
      pre_work.json artifact that the designer reads as additional context.
      Pure deterministic exploration is the intent — fast, ~$0 LLM cost.
      Path is relative to campaign.yaml.

  objective:
    type: object
    required: [weights]
    additionalProperties: false
    description: >
      Optional composite-scoring objective (issue #168). Declares per-metric
      weights for ranking candidates across iterations. Together with
      best_found.json, drives the deployment recommendation in
      meta_findings.json (issue #170).
    properties:
      weights:
        type: object
        description: "Map of metric name → weight. Weights must be ≥ 0 and sum to 1.0 (with float tolerance)."
        minProperties: 1
        additionalProperties:
          type: number
          minimum: 0
      metric_extractors:
        type: object
        description: >
          Optional map of metric name → dotted path into arms[].metadata
          (e.g. "metadata.compound_return"). When omitted, the metric name
          is used as a flat key in the observed_metrics dict.
        additionalProperties:
          type: string
          minLength: 1
      deploy_threshold:
        type: number
        minimum: 0
        description: "How much best_found composite score must exceed baseline_score to trigger 'deploy' rather than 'deploy_with_caveats'. Default 0.1. Issue #170."

  objective_preset:
    type: string
    enum: [compound-return-style, latency-style]
    description: >
      Opt-in named preset for the objective block (issue #168). Mutually
      exclusive with `objective`. Adding new presets requires a schema
      change so users can never silently inherit weights they didn't see.
