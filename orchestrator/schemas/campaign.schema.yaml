$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://github.com/AI-native-Systems-Research/agentic-strategy-evolution/schemas/campaign.schema.yaml"
title: Campaign Configuration
description: >
  Domain-specific settings for a Nous campaign. Configures the target system,
  reviewer panel, and prompt layers. Generated during setup (with Claude assistance)
  and referenced by state.json via config_ref.

type: object
required: [target_system, research_question, prompts]
additionalProperties: false

properties:
  research_question:
    type: string
    minLength: 1
    description: "The guiding research question for this campaign."

  run_id:
    type: string
    minLength: 1
    description: "Working directory name for campaign output. CLI --run-id overrides this. Default: derived from campaign file path."

  max_iterations:
    type: integer
    minimum: 1
    description: "Maximum number of iterations for run_campaign.py. CLI --max-iterations overrides this. Default: 10."

  iterations:
    type: array
    minItems: 1
    description: >
      Optional per-iteration overrides (#212). When present, each entry
      is consulted by index for that iteration's ``mode``. iter-1 looks
      up ``iterations[0]``, iter-2 ``iterations[1]``, and so on. Out-of-
      range iterations fall back to mode=real.

      v1 supports the ``mode`` field: a ``rehearsal`` iteration tells
      the design agent to keep scope minimal — focus on the apparatus
      (does the workload spec parse? do BLIS args bind? does analysis
      validate?) and the feasibility check (does the parameter regime
      actually engage the mechanism?). Surface any campaign-spec
      friction as ``brief_amendments.md`` so subsequent runs of the
      same campaign benefit. A ``real`` iteration is the full run.

      Operators typically schedule iter-1 as rehearsal and iter-2+ as
      real. That's not enforced, just the documented usage.
    items:
      type: object
      required: [mode]
      additionalProperties: false
      properties:
        mode:
          type: string
          enum: [rehearsal, real]
          description: >
            ``rehearsal`` = surgical scope check (#212). ``real`` = full
            arms × full seed list × no scope shrink.

  target_system:
    type: object
    required: [name, description]
    additionalProperties: false
    properties:
      name:
        type: string
        minLength: 1
        description: "Human-readable system name."
      description:
        type: string
        minLength: 1
        description: "What the system does — domain, purpose, architecture."
      observable_metrics:
        type: array
        items: { type: string, minLength: 1 }
        minItems: 1
        description: "Measurable outputs (e.g., latency, throughput, error rate)."
      controllable_knobs:
        type: array
        items: { type: string, minLength: 1 }
        minItems: 1
        description: "What can be changed (algorithms, configs, resource limits)."
      repo_path:
        type: ["string", "null"]
        minLength: 1
        description: "Path to target system git repo. Used by CLIDispatcher for code-access agents. If set, experiments run in isolated worktrees."
      worktree_extras:
        type: array
        items:
          type: string
          minLength: 1
        uniqueItems: true
        description: >
          Paths (relative to repo_path) to symlink into each experiment
          worktree on creation (#229). Use this for gitignored assets
          the executor needs from main — virtualenvs, pre-fetched data
          dirs, prior-iteration outputs, build artifacts. Without this
          mechanism, executors discover that the worktree is missing
          their tooling and `cd` back to the parent repo, silently
          breaking isolation. Each entry must be a relative path that
          resolves under repo_path; absolute paths and ``..`` traversal
          are rejected at worktree creation. Source must exist in main
          at the time of worktree creation.
      live_target:
        type: boolean
        description: "If true, the executor runs directly in repo_path with no per-iteration git worktree. Use for campaigns that probe a running system (cluster, service, dataset) where there is no code to evolve. Bundles must contain no code_changes arms."

  metadata:
    type: object
    additionalProperties: true
    description: "User-defined metadata (tags, goal, etc.). Copied to work dir at init."

  models:
    type: object
    additionalProperties: false
    description: "Per-phase model selection. Omit to use --model default for all phases."
    properties:
      design: { type: string, description: "Model for DESIGN phase (claude -p). Default: claude-opus-4-6." }
      execute_analyze: { type: string, description: "Model for EXECUTE_ANALYZE phase (claude -p). Default: claude-sonnet-4-6." }
      report: { type: string, description: "Model for report generation (LLM API). Default: claude-sonnet-4-6." }

  sdk_timeouts:
    type: object
    additionalProperties: false
    description: >
      SDK turn timing controls (#201). Per-campaign tunables for the
      silence detector that surfaces excessive event gaps to
      retry_log.jsonl after each turn. Observation-only today —
      operators can scan retry_log for ``failure_type: sdk_silence`` to
      catch hung subprocesses, polling-loop stalls, and API stalls
      without watching the run live.

      #264 (F19): ``turn_silence_threshold_seconds`` (and the bundle-side
      override at experiment_spec.timing_observations.recommended_turn_silence_threshold_seconds)
      may be either a scalar (legacy: same threshold for every phase) or
      a per-phase map ``{design, execute_analyze, report}``. Different
      phases have different rhythms — DESIGN does heavy reasoning between
      tool calls, EXECUTE_ANALYZE does frequent simulator calls — so
      one number for both is wrong by construction.
    properties:
      silence_threshold_seconds:
        type: number
        minimum: 0
        description: >
          Minimum gap between SDK streaming events that should trigger a
          silence warning in retry_log.jsonl. Default 600 (10 minutes).
          Set to 0 to disable the diagnostic entirely.
      turn_silence_threshold_seconds:
        oneOf:
          - type: number
            minimum: 0
          - type: object
            additionalProperties: false
            properties:
              design: { type: number, minimum: 0 }
              execute_analyze: { type: number, minimum: 0 }
              report: { type: number, minimum: 0 }
        description: >
          Live mid-turn watchdog (#205) override. Scalar form applies
          globally (legacy). Map form (#264 / F19) applies per-phase —
          recommended defaults: design=600, execute_analyze=120,
          report=240. Phases not listed in the map fall back to
          ``silence_threshold_seconds`` (or 600 if also unset).

  sandbox:
    type: string
    enum: [bypass, default]
    description: >
      Claude Agent SDK filesystem sandbox mode (#193). Default: ``bypass``.
      Nous campaigns routinely write outside the launched cwd (the
      orchestrator runs the agent with cwd=experiment-worktree, but
      build/test/BLIS subprocesses write to the main repo's
      .nous/<run>/runs/iter-N/results/). The default sandbox blocks
      these writes; ``bypass`` removes the restriction. Set to
      ``default`` only if the campaign genuinely lives entirely under
      the launched cwd (rare).

  validation:
    type: object
    additionalProperties: false
    description: >
      Per-campaign overrides to nous's validators (#199). Most campaigns
      don't need this block; paper-* and other campaigns with custom
      iter-root artifacts (analysis_summary.json, manifest.json,
      probe_report.md, …) declare them here so validate_design /
      validate_execution don't reject them as "unexpected file at iter
      root."
    properties:
      iter_root_extensions:
        type: array
        items:
          type: string
          minLength: 1
        uniqueItems: true
        description: >
          Additional filenames allowed at the iter root (in addition to
          the global whitelist in orchestrator/validate.py). Names only,
          not paths — files in subdirectories are always allowed.
      required_iter_root:
        type: array
        items:
          type: string
          minLength: 1
        uniqueItems: true
        description: >
          Filenames that MUST exist at the iter root after EXECUTE_ANALYZE
          completes (#199 v2). validate_execution emits a "required
          iter-root file missing: X" error for each missing entry,
          turning silent omissions into structured failures (sister to
          #187's DesignIncompleteError and #200's
          ExecuteAnalyzeIncompleteError). Required files are implicitly
          allowed at the iter root — no need to also list them in
          iter_root_extensions. Names only, not paths.

  max_turns:
    type: object
    additionalProperties: false
    description: >
      Per-phase maximum tool-use turns (#186). Resolution order:
      campaign.max_turns[phase] > defaults.yaml max_turns[phase] >
      hardcoded fallback (25). Different campaigns have different tool
      budgets — a 50-arm fanout may need 200+ design turns while a
      probe-only campaign fits in 30.
    properties:
      design:
        type: integer
        minimum: 1
        description: "Max turns for the DESIGN phase. Defaults to defaults.yaml.max_turns.design (80)."
      execute_analyze:
        type: integer
        minimum: 1
        description: "Max turns for EXECUTE_ANALYZE. Defaults to defaults.yaml.max_turns.execute_analyze (120)."
      report:
        type: integer
        minimum: 1
        description: "Max turns for the report-generation phase. Defaults to 25 if unset everywhere."

  prompts:
    type: object
    required: [methodology_layer]
    additionalProperties: false
    properties:
      methodology_layer:
        type: string
        minLength: 1
        description: "Path to generic Nous methodology prompts."
      domain_adapter_layer:
        type: ["string", "null"]
        description: >
          ⚠️ NOT YET IMPLEMENTED (issue #89). Setting this field triggers a
          warning and the value is ignored. Put domain-specific context
          (data schema gotchas, exact paths, baselines, statistical
          guardrails) in `target_system.description` instead — that field
          IS substituted into the LLM's prompts. The `nous create-campaign`
          skill walks authors through the correct structure.

  pre_work_script:
    type: string
    minLength: 1
    description: >
      Optional path to a user-supplied pre-work script (issue #167). Run before
      iter-1 DESIGN as a subprocess; the stdout JSON is parsed into a
      pre_work.json artifact that the designer reads as additional context.
      Pure deterministic exploration is the intent — fast, ~$0 LLM cost.
      Path is relative to campaign.yaml.

  objective:
    type: object
    required: [weights]
    additionalProperties: false
    description: >
      Optional composite-scoring objective (issue #168). Declares per-metric
      weights for ranking candidates across iterations. Together with
      best_found.json, drives the deployment recommendation in
      meta_findings.json (issue #170).
    properties:
      weights:
        type: object
        description: "Map of metric name → weight. Weights must be ≥ 0 and sum to 1.0 (with float tolerance)."
        minProperties: 1
        additionalProperties:
          type: number
          minimum: 0
      metric_extractors:
        type: object
        description: >
          Optional map of metric name → dotted path into arms[].metadata
          (e.g. "metadata.compound_return"). When omitted, the metric name
          is used as a flat key in the observed_metrics dict.
        additionalProperties:
          type: string
          minLength: 1
      deploy_threshold:
        type: number
        minimum: 0
        description: "How much best_found composite score must exceed baseline_score to trigger 'deploy' rather than 'deploy_with_caveats'. Default 0.1. Issue #170."

  objective_preset:
    type: string
    enum: [compound-return-style, latency-style]
    description: >
      Opt-in named preset for the objective block (issue #168). Mutually
      exclusive with `objective`. Adding new presets requires a schema
      change so users can never silently inherit weights they didn't see.

  locked_parameters:
    type: object
    additionalProperties: true
    description: >
      Issue #246 (F1): campaign-author-declared parameters that are
      hard-pinned for this campaign's experiments. Each ``key: value``
      entry MUST appear identically in
      ``bundle.experiment_spec.verified_parameters``; mismatches are
      hard validation failures (see ``orchestrator.validate.validate_design``)
      that fire **regardless of --auto-approve**. This is the spec-
      fidelity primitive that closes the gap left by HUMAN_DESIGN_GATE
      bypass under auto-approve.

      Idiomatic keys: ``model``, ``concurrency_per_tenant``,
      ``duration_seconds``, ``warmup_seconds``, ``total_kv_blocks``,
      and any other knob whose deviation would invalidate the
      experiment. See ``docs/campaign-authoring-guide.md`` for the
      "what to lock" inventory.

  locked_workload:
    type: object
    additionalProperties: true
    description: >
      Issue #265 (F20): canonical workload structure that
      ``bundle.inputs/<workload>.yaml`` must match. Same hard-fail
      semantics as ``locked_parameters``, but covers the workload
      yaml content (per-tenant input/output distributions,
      concurrency) which doesn't appear in
      ``verified_parameters``. Entry shape mirrors the workload yaml
      structure so a copy-paste from the canonical workload is the
      simplest authoring path. Deliberate deviations require
      ``bundle.workload_changes_from_canonical`` (see #265).

  derived_from:
    type: object
    additionalProperties: false
    required: [campaign]
    description: >
      Issue #266 (F21): declares that this campaign inherits the
      worktree code state of a prior campaign at a specific iteration.
      At INIT, nous reads
      ``$NOUS_CAMPAIGN_PARENT/<campaign>/runs/iter-<iteration>/patches/cumulative.patch``
      (or the legacy ``<target>/.nous/...`` location) and applies it
      as a preflight to every experiment worktree. Removes the manual
      "find the right patch, verify it applies, bake into preflight_commands"
      archeology that follow-up campaigns paid for in paper-memorytime-mirage.
    properties:
      campaign:
        type: string
        minLength: 1
        description: "run_id of the prior campaign whose code state to inherit."
      iteration:
        oneOf:
          - { type: integer, minimum: 1 }
          - { type: string, enum: [final] }
        description: >
          Iteration whose ``cumulative.patch`` to apply. ``final`` resolves to
          the highest-numbered completed iteration. Default: ``final``.

  plot_specs:
    type: array
    description: >
      Issue #263 (F18): declarative figure pipeline. After
      ``findings.json`` is written in REPORT, nous invokes each
      script with environment variables ``NOUS_RESULTS_DIR`` (the
      iter's results/) and ``NOUS_FIGURES_DIR`` (the iter's
      figures/, auto-created). The script's job is to read JSON
      from results/ and write outputs to figures/. Solves the
      "every paper rebuilds figure scaffolding" problem in one
      campaign-level declaration.
    items:
      type: object
      required: [id, script]
      additionalProperties: false
      properties:
        id:
          type: string
          minLength: 1
          description: "Stable identifier (e.g. ``figure-1-mirage-ratio``)."
        script:
          type: string
          minLength: 1
          description: "Path to the figure script (relative to campaign.yaml)."
        consumes:
          type: array
          items: { type: string, minLength: 1 }
          description: "Arm IDs whose results feed this figure (informational; the script reads results/ itself)."
        metrics:
          type: array
          items: { type: string, minLength: 1 }
          description: "Metric names the figure depends on (informational)."
        outputs:
          type: array
          items: { type: string, minLength: 1 }
          description: "Output filenames written to ``figures/`` (informational; checked when the script returns)."
        caption:
          type: string
          description: "Caption text (also used in nous package's README)."

  reproducibility_metadata:
    type: object
    additionalProperties: true
    description: >
      Issue #262 (F17): auto-populated by ``nous run`` at INIT (before
      DESIGN). Captures the environment metadata required for external
      reproduction that nous would otherwise leave to operator
      memory: target repo commit, hardware-config sha, language
      versions, gpu_memory_utilization, etc. Per-iteration snapshots
      of latency-config files land in ``runs/iter-N/snapshots/``.

      The block is user-readable but **not user-set** — values present
      at campaign load time are overwritten by the INIT capturer. To
      pin a value the user controls (e.g. choose a specific commit),
      check it out before running nous; the captured ``repo_commit``
      reflects what was on disk.
    properties:
      repo_commit: { type: string, description: "Target repo HEAD sha at INIT." }
      repo_dirty:
        type: boolean
        description: "True if the working tree had uncommitted changes when nous started."
      hardware_config_sha256:
        type: string
        description: "SHA-256 of the target repo's hardware_config.json (or equivalent)."
      latency_config_files:
        type: array
        items: { type: string, minLength: 1 }
        description: "Paths to model-latency config files snapshotted into snapshots/."
      go_sum_sha256:
        type: string
        description: "SHA-256 of go.sum (Go targets)."
      requirements_sha256:
        type: string
        description: "SHA-256 of requirements.txt / pyproject.toml (Python targets)."
      package_lock_sha256:
        type: string
        description: "SHA-256 of package-lock.json (Node targets)."
      cargo_lock_sha256:
        type: string
        description: "SHA-256 of Cargo.lock (Rust targets)."
      language_versions:
        type: object
        additionalProperties: { type: string }
        description: "Map of language → version string (e.g. ``go: 1.22.0``)."
      gpu_memory_utilization:
        type: number
        description: "vLLM-style fraction; affects K derivation."
      captured_at:
        type: string
        description: "ISO-8601 timestamp when nous wrote this block."

  warm_start:
    type: object
    required: [prior_run_id]
    additionalProperties: false
    description: >
      Optional warm-start from a completed prior campaign on the same
      target repo (issue #83). Copies principles.json + handoff.md
      with drift detection; inherited principles are tagged
      `confidence: inherited` (no drift) or `confidence: tentative`
      (drift detected — designer must revalidate).
    properties:
      prior_run_id:
        type: string
        minLength: 1
        description: "Run id of the prior campaign whose knowledge to inherit."

  theory_references:
    type: array
    description: >
      Optional list of external, established theory the campaign uses
      to ground its ground truths (issue #88). Each entry names a
      theorem / law / identity and (optionally) describes how the
      designer should use it. Pairs with the ground_truth block on
      bundle.yaml (issue #85): theory_references say "here's the
      independent thermometer to use"; ground_truth.independence_argument
      says "and here's why it can disagree with the detector."

      #185: items may be either a string (short name only — useful when
      the theory is well-known and no how-to-use guidance is needed) or
      an object (full metadata). String entries are normalized to
      ``{name: <string>}`` internally.
    items:
      oneOf:
        - type: string
          minLength: 1
          description: >
            Short name only (e.g. "Little's Law"). Normalized internally
            to ``{name: <string>}`` with empty other fields. (#185)
        - type: object
          required: [name, statement]
          additionalProperties: false
          properties:
            name:
              type: string
              minLength: 1
              description: "Short name (e.g. 'Little's Law', 'M/G/K stability bound')."
            statement:
              type: string
              minLength: 1
              description: "Plain-English statement of the theorem."
            independent_of_detector:
              type: boolean
              description: "True iff this theorem doesn't depend on the detector under test."
            use_as:
              type: string
              enum: [ground_truth, sanity_check, calibration]
              description: "How the designer should use this in experiments."
            how:
              type: string
              minLength: 1
              description: "Plain-English instructions for applying the theorem (e.g. 'Compute μ_analytical = K / E[S] and compare against measured throughput.')."

  ground_truth:
    type: object
    additionalProperties: false
    description: >
      Optional pre-registered ground truth for the campaign (#185).
      Best-paper rigor calls for declaring the immutable direction
      claim and pass condition before any iteration runs, so the agent
      cannot silently move the goalposts. When present, this block is
      rendered into the agent's prompt template alongside
      ``target_system.description`` so the inner LLM sees it directly.
      Distinct from the per-iteration ``ground_truth`` block on
      bundle.yaml (issue #85) which describes the independence argument
      for that iteration's detector.
    properties:
      pre_registered:
        type: boolean
        description: "True if this ground truth was committed before any data was collected."
      workload:
        type: string
        minLength: 1
        description: "Concrete workload / dataset specification (paths, seeds, params)."
      baselines:
        type: array
        items: { type: string, minLength: 1 }
        description: "Pre-specified baselines the candidate must beat — names that map to bundle.yaml arms."
      primary_metric:
        type: string
        minLength: 1
        description: "The single metric the campaign is evaluated on (e.g. 'P95(latency)')."
      direction_claim:
        type: string
        minLength: 1
        description: "The directional claim being tested (e.g. 'P95(ea-wfq) < P95(wfq) for EARLY class')."
      pass_condition:
        type: string
        minLength: 1
        description: "Concrete pass/fail rule (e.g. 'direction holds in median across 10 seeds AND in ≥7 of 10 seeds')."
      seeds:
        type: array
        items: { type: integer }
        minItems: 1
        description: "Pre-registered seed list. Locking these in advance prevents seed cherry-picking after the fact."
